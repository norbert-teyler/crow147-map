var map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:22}).addTo(map);

var info=L.control({position:'topright'});
info.onAdd=function(){this._div=L.DomUtil.create('div','info');this.update();return this._div;};
info.update=function(p){
  this._div.innerHTML=p
    ?'<b>'+(p.n||'')+'</b><br>Kwaliteit: <b>'+(p.k!=null?p.k:'-')+'</b><br>Score: '+(p.i||'-')+'<br>Gebrek: '+(p.g||'-')
    :'<i>Hover over een vlak</i>';
};
info.addTo(map);

// Track selected name for filtering
var selectedName = null;

var gl=L.geoJSON(D,{
  style:function(f){return{fillColor:f.properties.c,fillOpacity:.85,color:'#333',weight:1}},
  onEachFeature:function(f,l){
    l.on({
      mouseover:function(e){
        if(selectedName !== f.properties.n){
          e.target.setStyle({weight:3,color:'#000',fillOpacity:1});
        }
        info.update(f.properties);
      },
      mouseout:function(e){
        if(selectedName !== f.properties.n){
          gl.resetStyle(e.target);
        }
        info.update(selectedName ? {n:selectedName} : null);
      },
      click:function(e){
        // Reset previous selection
        gl.resetStyle();
        
        if(selectedName === f.properties.n){
          // Deselect - clear filter
          selectedName = null;
          info.update();
          // Send clear filter message to Power BI
          window.parent.postMessage(JSON.stringify({
            type: "filter",
            column: "name",
            value: null
          }), "*");
        } else {
          // New selection - highlight all polygons with same name
          selectedName = f.properties.n;
          gl.eachLayer(function(layer){
            if(layer.feature.properties.n === selectedName){
              layer.setStyle({weight:3,color:'#000',fillOpacity:1,fillColor:layer.feature.properties.c});
            }
          });
          info.update(f.properties);
          // Send filter message to Power BI HTML Content visual
          window.parent.postMessage(JSON.stringify({
            type: "filter",
            column: "name",
            value: f.properties.n
          }), "*");
        }
        L.DomEvent.stopPropagation(e);
      }
    });
  }
}).addTo(map);
map.fitBounds(gl.getBounds());

// Listen for filter messages from Power BI (when table is clicked)
window.addEventListener('message', function(e){
  try {
    var msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    if(msg && msg.type === 'filter' && msg.column === 'name'){
      gl.resetStyle();
      selectedName = msg.value;
      if(selectedName){
        gl.eachLayer(function(layer){
          if(layer.feature.properties.n === selectedName){
            layer.setStyle({weight:3,color:'#000',fillOpacity:1});
          }
        });
      }
    }
  } catch(err){}
});

var leg=L.control({position:'bottomleft'});
leg.onAdd=function(){
  var d=L.DomUtil.create('div','legend');
  d.innerHTML='<b>Kwaliteit</b><br>'+
    ['<div class=li><div class=lc style=background:#00AA00></div>≥ 0.9 Goed</div>',
     '<div class=li><div class=lc style=background:#FFAA00></div>0.6 – 0.9</div>',
     '<div class=li><div class=lc style=background:#FF6600></div>0.3 – 0.6</div>',
     '<div class=li><div class=lc style=background:#CC0000></div>< 0.3 Slecht</div>',
     '<div class=li><div class=lc style=background:#888></div>Geen data</div>'].join('');
  return d;
};
leg.addTo(map);
</script></body></html>
